<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mise — find what to cook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,500&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2420;
    --paper:#FBF6EC;
    --card:#FFFFFB;
    --saffron:#E8A23D;
    --saffron-deep:#C97F1F;
    --herb:#55724F;
    --herb-deep:#3E5539;
    --rust:#B44B28;
    --line: rgba(43,36,32,0.12);
    --shadow: 0 6px 24px rgba(43,36,32,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Public Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Fraunces', serif; margin:0;}
  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}

  /* ---------- Header ---------- */
  .site-header{
    background:var(--ink);
    color:var(--paper);
    padding:18px 6vw;
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand h1{font-size:1.6rem; font-weight:700; letter-spacing:0.5px;}
  .brand span{
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    color:var(--saffron);
    text-transform:uppercase;
    letter-spacing:1.5px;
  }

  /* ---------- Hero / Search ---------- */
  .hero{
    padding:64px 6vw 40px;
    text-align:center;
    max-width:820px;
    margin:0 auto;
  }
  .hero h2{
    font-size:clamp(2rem, 5vw, 3.2rem);
    font-weight:600;
    font-style:italic;
    line-height:1.15;
  }
  .hero p{
    margin-top:14px;
    color:rgba(43,36,32,0.65);
    font-size:1rem;
  }
  .search-form{
    margin:32px auto 0;
    display:flex;
    max-width:560px;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:100px;
    padding:6px 6px 6px 22px;
    box-shadow:var(--shadow);
  }
  .search-form input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-size:1rem;
    font-family:inherit;
    color:var(--ink);
  }
  .search-form input::placeholder{color:rgba(43,36,32,0.4);}
  .search-form button{
    background:var(--saffron);
    border:none;
    color:var(--ink);
    font-weight:700;
    padding:12px 24px;
    border-radius:100px;
    transition:background 0.15s ease;
    font-size:0.95rem;
  }
  .search-form button:hover{background:var(--saffron-deep); color:var(--paper);}

  /* ---------- Category chips ---------- */
  .chip-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:16px;
    max-width:800px;
    margin-left:auto;
    margin-right:auto;
  }
  .chip{
    border:1px solid var(--line);
    background:var(--card);
    padding:7px 16px;
    border-radius:100px;
    font-size:0.82rem;
    font-weight:500;
    color:var(--ink);
    transition:all 0.15s ease;
  }
  .chip:hover{border-color:var(--herb);}
  .chip.active{
    background:var(--herb);
    border-color:var(--herb);
    color:var(--paper);
  }

  /* ---------- Status ---------- */
  .status-msg{
    text-align:center;
    padding:60px 20px;
    color:rgba(43,36,32,0.55);
    font-size:1rem;
  }
  .status-msg.error{color:var(--rust);}

  /* ---------- Grid & cards ---------- */
  .grid-wrap{
    max-width:1180px;
    margin:0 auto;
    padding:20px 6vw 60px;
  }
  .section-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--herb-deep);
    margin-bottom:18px;
    display:block;
  }
  .recipe-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:26px;
  }
  .recipe-card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
    cursor:pointer;
    transition:transform 0.18s ease, box-shadow 0.18s ease;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .recipe-card:hover{transform:translateY(-4px); box-shadow:0 12px 30px rgba(43,36,32,0.18);}
  .recipe-card .thumb{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    display:block;
    background:var(--line);
  }
  .recipe-card .body{
    padding:16px 16px 18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
  }
  .recipe-card h3{
    font-size:1.08rem;
    font-weight:600;
    line-height:1.3;
  }
  .tag-row{display:flex; gap:6px; flex-wrap:wrap;}
  .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    text-transform:uppercase;
    letter-spacing:0.6px;
    padding:4px 9px;
    border-radius:5px;
    background:rgba(85,114,79,0.12);
    color:var(--herb-deep);
    position:relative;
  }
  .tag.area{background:rgba(180,75,40,0.10); color:var(--rust);}

  /* diet mark: classic veg/non-veg square-and-dot indicator */
  .diet-mark{
    width:16px; height:16px;
    border:2px solid var(--herb);
    border-radius:3px;
    display:inline-flex; align-items:center; justify-content:center;
    flex:none;
  }
  .diet-mark .diet-dot{width:7px; height:7px; border-radius:50%; background:var(--herb);}
  .diet-mark.nonveg{border-color:var(--rust);}
  .diet-mark.nonveg .diet-dot{background:var(--rust);}
  .diet-mark.dessert{border-color:var(--saffron-deep);}
  .diet-mark.dessert .diet-dot{background:var(--saffron-deep); border-radius:2px;}

  /* ---------- Food type tabs ---------- */
  .type-tabs{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:34px;
  }
  .type-tab{
    display:flex; align-items:center; gap:8px;
    border:2px solid var(--ink);
    background:var(--card);
    padding:10px 20px;
    border-radius:100px;
    font-weight:600;
    font-size:0.88rem;
    color:var(--ink);
    transition:all 0.15s ease;
  }
  .type-tab:hover{background:rgba(43,36,32,0.06);}
  .type-tab.active{background:var(--ink); color:var(--paper);}
  .type-emoji{font-size:1rem; line-height:1;}

  /* skeleton loading */
  .skeleton-card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .skeleton-thumb{aspect-ratio:4/3; background:linear-gradient(90deg, #eee6d8 25%, #f5efe2 37%, #eee6d8 63%); background-size:400% 100%; animation:shimmer 1.4s infinite;}
  .skeleton-line{height:12px; margin:16px; border-radius:4px; background:linear-gradient(90deg, #eee6d8 25%, #f5efe2 37%, #eee6d8 63%); background-size:400% 100%; animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:-100% 0;}}

  /* ---------- Pagination ---------- */
  .pagination{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:40px;
    flex-wrap:wrap;
  }
  .page-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:0.82rem;
    border:1px solid var(--line);
    background:var(--card);
    padding:9px 14px;
    border-radius:8px;
    min-width:38px;
    color:var(--ink);
  }
  .page-btn:hover:not(:disabled){border-color:var(--saffron-deep);}
  .page-btn.active{
    background:var(--ink);
    color:var(--saffron);
    border-color:var(--ink);
  }
  .page-btn:disabled{opacity:0.35; cursor:not-allowed;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(43,36,32,0.6);
    display:flex; align-items:flex-start; justify-content:center;
    padding:5vh 16px;
    overflow-y:auto;
    z-index:50;
  }
  .modal{
    background:var(--paper);
    max-width:780px;
    width:100%;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.35);
    animation:pop 0.18s ease;
  }
  @keyframes pop{from{transform:translateY(12px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-hero{position:relative;}
  .modal-hero img{width:100%; max-height:320px; object-fit:cover; display:block;}
  .modal-close{
    position:absolute; top:14px; right:14px;
    background:var(--ink); color:var(--paper);
    border:none; width:36px; height:36px; border-radius:50%;
    font-size:1.1rem; line-height:1;
  }
  .modal-body{padding:28px 32px 40px;}
  .modal-body h2{font-size:1.9rem; font-weight:700; margin-bottom:10px;}
  .modal-columns{
    display:grid;
    grid-template-columns:1fr 1.4fr;
    gap:34px;
    margin-top:26px;
  }
  .ingredient-list{list-style:none; margin:0; padding:0;}
  .ingredient-list li{
    display:flex; align-items:center; gap:10px;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
    font-size:0.92rem;
  }
  .ingredient-list li.checked{opacity:0.4; text-decoration:line-through;}
  .checkbox{
    width:18px; height:18px; border-radius:5px;
    border:2px solid var(--herb); flex:none;
    display:flex; align-items:center; justify-content:center;
    font-size:0.7rem; color:var(--paper);
  }
  .checkbox.on{background:var(--herb);}
  .ingredient-amt{font-family:'JetBrains Mono', monospace; font-size:0.78rem; color:var(--herb-deep); margin-left:auto;}
  .steps-list{list-style:none; margin:0; padding:0; counter-reset:step;}
  .steps-list li{
    counter-increment:step;
    position:relative;
    padding:0 0 20px 40px;
    font-size:0.93rem;
    line-height:1.55;
  }
  .steps-list li::before{
    content:counter(step);
    position:absolute; left:0; top:0;
    width:26px; height:26px; border-radius:50%;
    background:var(--saffron); color:var(--ink);
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:0.78rem;
    display:flex; align-items:center; justify-content:center;
  }
  .video-wrap{margin-top:30px;}
  .video-wrap iframe{width:100%; aspect-ratio:16/9; border:none; border-radius:10px;}
  .no-video{
    padding:20px; text-align:center; color:rgba(43,36,32,0.5);
    border:1px dashed var(--line); border-radius:10px; font-size:0.88rem;
  }

  footer{
    text-align:center;
    padding:30px 20px 50px;
    font-size:0.8rem;
    color:rgba(43,36,32,0.45);
  }

  @media (max-width: 700px){
    .site-header{padding:14px 5vw;}
    .hero{padding:44px 5vw 30px;}
    .modal-columns{grid-template-columns:1fr;}
    .modal-body{padding:22px 20px 32px;}
    .search-form{padding:5px 5px 5px 18px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API = "https://www.themealdb.com/api/json/v1/1";
const PAGE_SIZE = 12;

function toYoutubeEmbed(url) {
  if (!url) return null;
  const match = url.match(/[?&]v=([^&]+)/);
  const id = match ? match[1] : null;
  return id ? `https://www.youtube.com/embed/${id}` : null;
}

const VEG_CATEGORIES = ["Vegetarian", "Vegan"];
const NONVEG_CATEGORIES = ["Chicken", "Beef", "Lamb", "Pork", "Seafood", "Goat"];
const DESSERT_CATEGORIES = ["Dessert"];

const TYPE_TABS = [
  { key: "all", label: "All", emoji: "🍽️" },
  { key: "veg", label: "Veg", emoji: "🥦" },
  { key: "nonveg", label: "Non-Veg", emoji: "🍗" },
  { key: "dessert", label: "Desserts", emoji: "🍰" },
];

function classifyCategory(category) {
  if (!category) return null;
  if (VEG_CATEGORIES.includes(category)) return "veg";
  if (NONVEG_CATEGORIES.includes(category)) return "nonveg";
  if (DESSERT_CATEGORIES.includes(category)) return "dessert";
  return null;
}

function DietMark({ type }) {
  if (!type) return null;
  const label = type === "veg" ? "Vegetarian" : type === "nonveg" ? "Non-Vegetarian" : "Dessert";
  return (
    <span className={"diet-mark " + type} title={label} aria-label={label}>
      <span className="diet-dot"></span>
    </span>
  );
}

function RecipeCard({ meal, onOpen, dietType }) {
  return (
    <div className="recipe-card" onClick={() => onOpen(meal.idMeal, dietType)}>
      <img className="thumb" src={meal.strMealThumb} alt={meal.strMeal} loading="lazy" />
      <div className="body">
        <h3>{meal.strMeal}</h3>
        <div className="tag-row">
          <DietMark type={dietType} />
          {meal.strCategory && <span className="tag">{meal.strCategory}</span>}
          {meal.strArea && <span className="tag area">{meal.strArea}</span>}
        </div>
      </div>
    </div>
  );
}

function SkeletonGrid({ count }) {
  return (
    <div className="recipe-grid">
      {Array.from({ length: count }).map((_, i) => (
        <div className="skeleton-card" key={i}>
          <div className="skeleton-thumb"></div>
          <div className="skeleton-line" style={{ width: "70%" }}></div>
          <div className="skeleton-line" style={{ width: "40%" }}></div>
        </div>
      ))}
    </div>
  );
}

function RecipeModal({ mealId, onClose, fallbackDietType }) {
  const [meal, setMeal] = useState(null);
  const [loading, setLoading] = useState(true);
  const [checked, setChecked] = useState({});

  useEffect(() => {
    let active = true;
    setLoading(true);
    setMeal(null);
    setChecked({});
    fetch(`${API}/lookup.php?i=${mealId}`)
      .then((r) => r.json())
      .then((data) => {
        if (active) {
          setMeal(data.meals ? data.meals[0] : null);
          setLoading(false);
        }
      })
      .catch(() => active && setLoading(false));
    return () => { active = false; };
  }, [mealId]);

  const ingredients = React.useMemo(() => {
    if (!meal) return [];
    const list = [];
    for (let i = 1; i <= 20; i++) {
      const name = meal[`strIngredient${i}`];
      const measure = meal[`strMeasure${i}`];
      if (name && name.trim()) {
        list.push({ id: i, name: name.trim(), measure: (measure || "").trim() });
      }
    }
    return list;
  }, [meal]);

  const steps = React.useMemo(() => {
    if (!meal || !meal.strInstructions) return [];
    let raw = meal.strInstructions.replace(/\r\n/g, "\n").trim();
    let parts = raw.split(/\n+/).map((s) => s.trim()).filter(Boolean);
    if (parts.length < 2) {
      parts = raw.split(/(?<=[.])\s+(?=[A-Z0-9])/).map((s) => s.trim()).filter(Boolean);
    }
    return parts;
  }, [meal]);

  const embedUrl = meal ? toYoutubeEmbed(meal.strYoutube) : null;
  const dietType = meal ? (classifyCategory(meal.strCategory) || fallbackDietType) : fallbackDietType;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        {loading && <div className="status-msg">Loading recipe…</div>}
        {!loading && !meal && <div className="status-msg error">Couldn't load this recipe. Try again.</div>}
        {!loading && meal && (
          <React.Fragment>
            <div className="modal-hero">
              <img src={meal.strMealThumb} alt={meal.strMeal} />
              <button className="modal-close" onClick={onClose} aria-label="Close">✕</button>
            </div>
            <div className="modal-body">
              <h2>{meal.strMeal}</h2>
              <div className="tag-row">
                <DietMark type={dietType} />
                {meal.strCategory && <span className="tag">{meal.strCategory}</span>}
                {meal.strArea && <span className="tag area">{meal.strArea}</span>}
              </div>

              <div className="modal-columns">
                <div>
                  <span className="section-label">Ingredients</span>
                  <ul className="ingredient-list">
                    {ingredients.map((ing) => (
                      <li
                        key={ing.id}
                        className={checked[ing.id] ? "checked" : ""}
                        onClick={() => setChecked((c) => ({ ...c, [ing.id]: !c[ing.id] }))}
                      >
                        <span className={"checkbox" + (checked[ing.id] ? " on" : "")}>
                          {checked[ing.id] ? "✓" : ""}
                        </span>
                        {ing.name}
                        <span className="ingredient-amt">{ing.measure}</span>
                      </li>
                    ))}
                  </ul>
                </div>
                <div>
                  <span className="section-label">Method</span>
                  <ol className="steps-list">
                    {steps.map((s, i) => <li key={i}>{s}</li>)}
                  </ol>
                </div>
              </div>

              <div className="video-wrap">
                <span className="section-label">Watch it made</span>
                {embedUrl
                  ? <iframe src={embedUrl} title="Recipe video" allowFullScreen></iframe>
                  : <div className="no-video">No video available for this recipe.</div>}
              </div>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [meals, setMeals] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [allCategories, setAllCategories] = useState([]);
  const [activeType, setActiveType] = useState("all");
  const [activeCategory, setActiveCategory] = useState(null);
  const [page, setPage] = useState(1);
  const [heading, setHeading] = useState("Popular right now");
  const [selectedMeal, setSelectedMeal] = useState(null);

  useEffect(() => {
    fetch(`${API}/categories.php`)
      .then((r) => r.json())
      .then((data) => setAllCategories(data.categories || []))
      .catch(() => {});
    runSearch("chicken", null, "Popular right now");
  }, []);

  const browseChips = allCategories.slice(0, 8);
  const vegChips = allCategories.filter((c) => VEG_CATEGORIES.includes(c.strCategory));
  const nonVegChips = allCategories.filter((c) => NONVEG_CATEGORIES.includes(c.strCategory));

  const runSearch = useCallback((term, category, headingText) => {
    setLoading(true);
    setError(null);
    setPage(1);
    const url = category
      ? `${API}/filter.php?c=${encodeURIComponent(category)}`
      : `${API}/search.php?s=${encodeURIComponent(term || "")}`;
    fetch(url)
      .then((r) => r.json())
      .then((data) => {
        setMeals(data.meals || []);
        setHeading(headingText);
        setLoading(false);
      })
      .catch(() => {
        setError("Something went wrong reaching the recipe database. Please try again.");
        setLoading(false);
      });
  }, []);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!query.trim()) return;
    setActiveType("all");
    setActiveCategory(null);
    runSearch(query.trim(), null, `Results for "${query.trim()}"`);
  };

  const handleCategoryClick = (cat) => {
    if (activeCategory === cat) {
      setActiveCategory(null);
      runSearch("chicken", null, "Popular right now");
    } else {
      setActiveCategory(cat);
      setQuery("");
      runSearch(null, cat, `Browsing ${cat}`);
    }
  };

  const handleTypeClick = (type) => {
    setActiveType(type);
    setQuery("");
    if (type === "all") {
      setActiveCategory(null);
      runSearch("chicken", null, "Popular right now");
    } else if (type === "dessert") {
      setActiveCategory("Dessert");
      runSearch(null, "Dessert", "Desserts");
    } else if (type === "veg") {
      const first = vegChips[0] ? vegChips[0].strCategory : "Vegetarian";
      setActiveCategory(first);
      runSearch(null, first, `Veg — ${first}`);
    } else if (type === "nonveg") {
      const first = nonVegChips[0] ? nonVegChips[0].strCategory : "Chicken";
      setActiveCategory(first);
      runSearch(null, first, `Non-Veg — ${first}`);
    }
  };

  const handleSubCategoryClick = (cat, typeLabel) => {
    setActiveCategory(cat);
    runSearch(null, cat, `${typeLabel} — ${cat}`);
  };

  const openMeal = (id, dietType) => setSelectedMeal({ id, dietType });

  const pageCount = Math.max(1, Math.ceil(meals.length / PAGE_SIZE));
  const pageMeals = meals.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

  return (
    <React.Fragment>
      <header className="site-header">
        <div className="brand">
          <h1>Mise</h1>
          <span>everything in its place</span>
        </div>
      </header>

      <section className="hero">
        <h2>What's in your kitchen tonight?</h2>
        <p>Search any dish and get real ingredients, step-by-step method, and a video to follow along.</p>
        <form className="search-form" onSubmit={handleSubmit}>
          <input
            type="text"
            placeholder="Try “paneer”, “pasta”, “tacos”…"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
          />
          <button type="submit">Search</button>
        </form>

        <div className="type-tabs">
          {TYPE_TABS.map((t) => (
            <button
              key={t.key}
              className={"type-tab" + (activeType === t.key ? " active" : "")}
              onClick={() => handleTypeClick(t.key)}
            >
              <span className="type-emoji">{t.emoji}</span>{t.label}
            </button>
          ))}
        </div>

        {activeType === "all" && (
          <div className="chip-row">
            {browseChips.map((c) => (
              <button
                key={c.idCategory}
                className={"chip" + (activeCategory === c.strCategory ? " active" : "")}
                onClick={() => handleCategoryClick(c.strCategory)}
              >
                {c.strCategory}
              </button>
            ))}
          </div>
        )}
        {activeType === "veg" && (
          <div className="chip-row">
            {vegChips.map((c) => (
              <button
                key={c.idCategory}
                className={"chip" + (activeCategory === c.strCategory ? " active" : "")}
                onClick={() => handleSubCategoryClick(c.strCategory, "Veg")}
              >
                {c.strCategory}
              </button>
            ))}
          </div>
        )}
        {activeType === "nonveg" && (
          <div className="chip-row">
            {nonVegChips.map((c) => (
              <button
                key={c.idCategory}
                className={"chip" + (activeCategory === c.strCategory ? " active" : "")}
                onClick={() => handleSubCategoryClick(c.strCategory, "Non-Veg")}
              >
                {c.strCategory}
              </button>
            ))}
          </div>
        )}
      </section>

      <main className="grid-wrap">
        <span className="section-label">{heading}</span>

        {loading && <SkeletonGrid count={8} />}
        {!loading && error && <div className="status-msg error">{error}</div>}
        {!loading && !error && meals.length === 0 && (
          <div className="status-msg">No recipes found. Try a different search.</div>
        )}
        {!loading && !error && meals.length > 0 && (
          <React.Fragment>
            <div className="recipe-grid">
              {pageMeals.map((m) => (
                <RecipeCard
                  key={m.idMeal}
                  meal={m}
                  onOpen={openMeal}
                  dietType={classifyCategory(m.strCategory) || classifyCategory(activeCategory)}
                />
              ))}
            </div>

            {pageCount > 1 && (
              <div className="pagination">
                <button className="page-btn" disabled={page === 1} onClick={() => setPage((p) => p - 1)}>‹ Prev</button>
                {Array.from({ length: pageCount }).map((_, i) => (
                  <button
                    key={i}
                    className={"page-btn" + (page === i + 1 ? " active" : "")}
                    onClick={() => setPage(i + 1)}
                  >
                    {i + 1}
                  </button>
                ))}
                <button className="page-btn" disabled={page === pageCount} onClick={() => setPage((p) => p + 1)}>Next ›</button>
              </div>
            )}
          </React.Fragment>
        )}
      </main>

      {selectedMeal && (
        <RecipeModal
          mealId={selectedMeal.id}
          fallbackDietType={selectedMeal.dietType}
          onClose={() => setSelectedMeal(null)}
        />
      )}

      <footer>Recipe data courtesy of TheMealDB · Built with React</footer>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
